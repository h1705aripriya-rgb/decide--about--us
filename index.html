
<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Official Status Request ❤️</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #ffd6e7, #ffeccf);
    overflow: hidden;
    text-align: center;
}

.container {
    margin-top: 100px;
}

h1 {
    color: #ff4081;
    font-size: 3rem;
}

p {
    font-size: 1.3rem;
    color: #444;
    margin-bottom: 40px;
    padding: 0 20px;
}

.btn {
    border: none;
    border-radius: 50px;
    padding: 15px 30px;
    font-size: 20px;
    cursor: pointer;
    transition: all 0.3s ease;
}

#yesBtn {
    background: #4CAF50;
    color: white;
}

#noBtn {
    background: #ff9800;
    color: white;
    position: absolute;
}

.hearts {
    position: fixed;
    width: 100%;
    height: 100%;
    pointer-events: none;
    top: 0;
    left: 0;
}

.heart {
    position: absolute;
    color: pink;
    animation: float 5s linear infinite;
}

@keyframes float {
    from {
        transform: translateY(100vh);
        opacity: 1;
    }
    to {
        transform: translateY(-100px);
        opacity: 0;
    }
}
</style>

</head>

<body>

<div class="hearts" id="hearts"></div>

<div class="container">

<h1>📢 Official Status Request</h1>

<p>
After extensive research, emotional investment,
and several unnecessary overthinking sessions...
<br><br>
When are you going to decide about us? ❤️
</p>

<button id="yesBtn" class="btn">
I've Decided 💚
</button>

<button id="noBtn" class="btn">
Need More Time ⏳
</button>

</div>

<script>

const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");

let scale = 1;

noBtn.style.left = "60%";
noBtn.style.top = "60%";

function moveButton() {

    const maxX = window.innerWidth - noBtn.offsetWidth - 20;
    const maxY = window.innerHeight - noBtn.offsetHeight - 20;

    const x = Math.random() * maxX;
    const y = Math.random() * maxY;

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";

    scale += 0.15;
    yesBtn.style.transform = `scale(${scale})`;
}

noBtn.addEventListener("mouseover", moveButton);
noBtn.addEventListener("click", moveButton);

yesBtn.addEventListener("click", () => {

    document.body.innerHTML = `
    <div style="
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        flex-direction:column;
        background:linear-gradient(135deg,#ffd6e7,#ffeccf);
        font-family:Arial;">

        <h1 style="color:#e91e63;font-size:3rem;">
            ❤️ About Time! ❤️
        </h1>

        <p style="font-size:1.5rem;">
            The waiting committee is pleased with your decision. 😌
        </p>

        <p style="font-size:1.3rem;">
            Now let's have that conversation. ❤️
        </p>
    </div>`;
});

function createHeart() {
    const heart = document.createElement("div");
    heart.innerHTML = "❤️";
    heart.classList.add("heart");
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (20 + Math.random() * 20) + "px";

    document.getElementById("hearts").appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 5000);
}

setInterval(createHeart, 500);

</script>

</body>
</html>
